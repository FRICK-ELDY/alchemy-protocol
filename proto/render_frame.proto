syntax = "proto3";

package alchemy.render;

// スキーマの断片は `render_frame/*.proto`。エントリは本ファイル（prost / **Protobuf** ワイヤ契約のドキュメント起点。UDP・JSON 等の別形式は対象外。ドメイン SSoT は Elixir — docs/architecture/overview.md#設計思想）。
import "render_frame/cursor_grab.proto";
import "render_frame/mesh.proto";
import "render_frame/camera.proto";
import "render_frame/ui.proto";
import "render_frame/draw_commands.proto";

// レガシー: ETF を bytes で包んでいた形式（クライアントは後方互換で解釈）
message RenderFrameEnvelope {
  bytes payload = 1;
}

// Zenoh 配信用のネイティブ RenderFrame（ETF 廃止後の本体）
message RenderFrame {
  repeated DrawCommand commands = 1;
  CameraParams camera = 2;
  UiCanvas ui = 3;
  repeated MeshDef mesh_definitions = 4;
  optional CursorGrabKind cursor_grab = 5;
}
